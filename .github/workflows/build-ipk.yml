# --- [ FlowProxy | Standalone CI Pipeline | v1.1 ] ---
name: Build FlowProxy IPK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble IPK Package
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Provision Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gettext
          
          # 提取通用打包调度脚本
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -O /usr/local/bin/ipkg-build
          chmod +x /usr/local/bin/ipkg-build
          
          # [Category C] Note: 锁定分支至 openwrt-24.10 获取适配最新内核的 po2lmo 编译器
          git clone -b openwrt-24.10 --depth 1 https://github.com/openwrt/luci.git
          cd luci/modules/luci-base/src && make po2lmo
          sudo cp po2lmo /usr/local/bin/

      - name: 📦 Execute Physical Assembly
        run: bash ./scripts/build.sh

      - name: 📤 Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-flowproxy-latest
          path: "*.ipk"
          retention-days: 7  # [Category B] 设置临时构件声明周期，优化仓库配额
